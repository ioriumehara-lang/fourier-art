<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fourier Epicycles Art with Equation</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* 画面全体の誤選択を防ぐ */
        }
        #container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        canvas {
            border: 1px solid #333;
            background-color: #000;
            cursor: crosshair;
            border-radius: 6px;
        }
        #sidebar {
            width: 320px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        h3 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 18px;
        }
        p {
            margin: 0 0 15px 0;
            font-size: 13px;
            color: #888;
        }
        #equation-box {
            flex-grow: 1;
            background: #050505;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            color: #00ff66;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
            /* コピペを可能にする設定 */
            user-select: text !important;
            -webkit-user-select: text !important;
        }
        .eq-title {
            color: #00bfff;
            font-weight: bold;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div id="container">
        <div>
            <h3>Fourier Epicycles Art</h3>
            <p>キャンバスをドラッグして一筆書きで絵を描こう（クリックで引き直し）</p>
            <canvas id="canvas" width="600" height="600"></canvas>
        </div>
        
        <div id="sidebar">
            <div class="eq-title">📊 リアルタイムフーリエ数式</div>
            <div id="equation-box">絵を描くとここに数式が表示されます。ドラッグで範囲選択してコピー可能です。</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const equationBox = document.getElementById('equation-box');

let rawPoints = []; 
let fourierX = [];  
let time = 0;       
let path = [];      
let isDrawing = false;
let mode = 'drawing'; 
let animationFrameId = null;

// --- 離散フーリエ変換 (DFT) ---
function dft(points) {
    const N = points.length;
    const X = [];
    for (let k = 0; k < N; k++) {
        let re = 0;
        let im = 0;
        for (let n = 0; n < N; n++) {
            const phi = (Math.PI * 2 * k * n) / N;
            re += points[n].x * Math.cos(phi) + points[n].y * Math.sin(phi);
            im += -points[n].x * Math.sin(phi) + points[n].y * Math.cos(phi);
        }
        re = re / N;
        im = im / N;
        X.push({ freq: k, amp: Math.sqrt(re * re + im * im), phase: Math.atan2(im, re) });
    }
    return X.sort((a, b) => b.amp - a.amp);
}

function resetSystem() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    rawPoints = [];
    path = [];
    time = 0;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    equationBox.innerText = "絵を描くとここに数式が表示されます。ドラッグで範囲選択してコピー可能です。";
}

// --- お絵描きイベント ---
canvas.addEventListener('mousedown', (e) => {
    mode = 'drawing';
    resetSystem();
    isDrawing = true;
    const rect = canvas.getBoundingClientRect();
    rawPoints.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
});

canvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    if (rawPoints.length > 0) {
        const last = rawPoints[rawPoints.length - 1];
        if (last.x === x && last.y === y) return;
    }
    
    rawPoints.push({ x, y });

    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(rawPoints[rawPoints.length-2].x, rawPoints[rawPoints.length-2].y);
    ctx.lineTo(x, y);
    ctx.stroke();
});

window.addEventListener('mouseup', () => {
    if (!isDrawing) return;
    isDrawing = false;
    
    if (rawPoints.length > 2) {
        if (rawPoints.length > 200) { 
            const step = Math.ceil(rawPoints.length / 200);
            rawPoints = rawPoints.filter((_, i) => i % step === 0);
        }
        fourierX = dft(rawPoints);
        mode = 'playing';
        animate();
    }
});

// --- 周転円（エピサイクル）の計算・描画 ＆ 式の生成 ---
function drawEpicycles(x, y, fourier) {
    let eqX = "f(t) = \n  ";
    let isFirstParam = true;

    for (let i = 0; i < fourier.length; i++) {
        const prevX = x;
        const prevY = y;
        const { freq, amp, phase } = fourier[i];
        
        if (freq === 0) {
            x += amp * Math.cos(phase);
            y += amp * Math.sin(phase);
        } else {
            x += amp * Math.cos(freq * time + phase);
            y += amp * Math.sin(freq * time + phase);
        }

        if (freq !== 0 && amp > 0.5) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.beginPath();
            ctx.arc(prevX, prevY, amp, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(0, 150, 255, 0.3)';
            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        if (amp > 1.5 && i < 15) {
            const ampStr = amp.toFixed(1);
            const freqStr = freq === 0 ? "" : `*${freq}t`;
            const phaseStr = phase >= 0 ? `+${phase.toFixed(2)}` : `${phase.toFixed(2)}`;
            
            if (!isFirstParam) eqX += "\n+ ";
            eqX += `${ampStr} * cis(${freqStr}${phaseStr})`;
            isFirstParam = false;
        }
    }

    equationBox.innerText = eqX + "\n+ ... (以下省略)";
    return { x, y };
}

// --- アニメーションループ ---
function animate() {
    if (mode !== 'playing') return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const v = drawEpicycles(0, 0, fourierX);
    path.unshift(v);

    ctx.strokeStyle = '#ff007f';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
        if (i === 0) ctx.moveTo(path[i].x, path[i].y);
        else ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();

    const dt = (Math.PI * 2) / fourierX.length;
    time += dt;

    if (time > Math.PI * 2) {
        time = 0;
        path = []; 
    }

    animationFrameId = requestAnimationFrame(animate);
}
</script>
</body>
</html>
