<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fourier Epicycles Art</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 1px solid #333;
            background-color: #000;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        h3 {
            margin-bottom: 15px;
            letter-spacing: 1px;
            color: #ccc;
        }
        p {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h3>キャンバスをドラッグして一筆書きで絵を描こう</h3>
    <canvas id="canvas" width="600" height="600"></canvas>
    <p>※新しくクリックすると、自動で前の絵が消えて描き直せます</p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let rawPoints = []; 
let fourierX = [];  
let time = 0;       
let path = [];      
let isDrawing = false;
let mode = 'drawing'; 
let animationFrameId = null;

// --- 離散フーリエ変換 (DFT) ---
function dft(points) {
    const N = points.length;
    const X = [];
    for (let k = 0; k < N; k++) {
        let re = 0;
        let im = 0;
        for (let n = 0; n < N; n++) {
            const phi = (Math.PI * 2 * k * n) / N;
            re += points[n].x * Math.cos(phi) + points[n].y * Math.sin(phi);
            im += -points[n].x * Math.sin(phi) + points[n].y * Math.cos(phi);
        }
        re = re / N;
        im = im / N;
        X.push({ freq: k, amp: Math.sqrt(re * re + im * im), phase: Math.atan2(im, re) });
    }
    // ここでソートしますが、周波数0（全体の重心）の位置を固定するため、
    // 重心成分を外してからソートするか、今回はdraw側で位置を調整します
    return X.sort((a, b) => b.amp - a.amp);
}

function resetSystem() {
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
    }
    rawPoints = [];
    path = [];
    time = 0;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// --- お絵描きイベント ---
canvas.addEventListener('mousedown', (e) => {
    mode = 'drawing';
    resetSystem();
    isDrawing = true;
    const rect = canvas.getBoundingClientRect();
    rawPoints.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
});

canvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    if (rawPoints.length > 0) {
        const last = rawPoints[rawPoints.length - 1];
        if (last.x === x && last.y === y) return;
    }
    
    rawPoints.push({ x, y });

    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(rawPoints[rawPoints.length-2].x, rawPoints[rawPoints.length-2].y);
    ctx.lineTo(x, y);
    ctx.stroke();
});

window.addEventListener('mouseup', () => {
    if (!isDrawing) return;
    isDrawing = false;
    
    if (rawPoints.length > 2) {
        if (rawPoints.length > 400) {
            const step = Math.ceil(rawPoints.length / 400);
            rawPoints = rawPoints.filter((_, i) => i % step === 0);
        }
        fourierX = dft(rawPoints);
        mode = 'playing';
        animate();
    }
});

// --- 周転円（エピサイクル）の計算と描画 ---
function drawEpicycles(x, y, fourier) {
    // 【修正点】スタート位置（x, y）を(0,0)にして、フーリエの直流成分（重心）から計算を始める
    for (let i = 0; i < fourier.length; i++) {
        const prevX = x;
        const prevY = y;
        const { freq, amp, phase } = fourier[i];
        
        // 周波数が0の成分は回転せず、絵の「中心座標そのもの」を表す
        if (freq === 0) {
            x += amp * Math.cos(phase);
            y += amp * Math.sin(phase);
        } else {
            x += amp * Math.cos(freq * time + phase);
            y += amp * Math.sin(freq * time + phase);
        }

        // 最初の移動（重心への移動）の円は描画せず、それ以降の回転する円だけを描画する
        if (freq !== 0 && amp > 0.5) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.beginPath();
            ctx.arc(prevX, prevY, amp, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(0, 150, 255, 0.3)';
            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }
    return { x, y };
}

// --- アニメーションループ ---
function animate() {
    if (mode !== 'playing') return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 【修正点】キャンバスの中心(width/2, height/2)から始めるのではなく、
    // (0,0)から計算をスタートさせて、フーリエ内の絶対座標に委ねる
    const v = drawEpicycles(0, 0, fourierX);
    path.unshift(v);

    // 再現された線の描画
    ctx.strokeStyle = '#ff007f';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
        if (i === 0) ctx.moveTo(path[i].x, path[i].y);
        else ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();

    const dt = (Math.PI * 2) / fourierX.length;
    time += dt;

    if (time > Math.PI * 2) {
        time = 0;
        path = []; 
    }

    animationFrameId = requestAnimationFrame(animate);
}
</script>
</body>
</html>
